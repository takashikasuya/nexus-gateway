# Scale verification compose — 2000 points (BACnet 5 devices × 200pts + OPC-UA 1000pts)
#
# Usage:
#   cd fixtures/scale
#   docker compose -f docker-compose.scale.yml build
#   docker compose -f docker-compose.scale.yml up -d
#   docker compose -f docker-compose.scale.yml down
#
# Environment overrides (set before running):
#   BOS_INGRESS_ADDR  — default: 192.168.0.18:5051
#   BOS_EGRESS_ADDR   — default: 192.168.0.18:5052
#   NATS_HOST_PORT    — host port for NATS client (default: 14222)
#
# BACnet networking:
#   The BACnet simulator and connectors use network_mode: host so that
#   UDP multicast/broadcast traffic reaches the bacpypes3 stack without
#   NAT. They connect to NATS via the host-mapped port (default 14222).
#
# BACnet device ↔ connector port mapping:
#   device 1001 / port 47808  →  bacnet-connector-01  (ahu-01)
#   device 1002 / port 47809  →  bacnet-connector-02  (ahu-02)
#   device 1003 / port 47810  →  bacnet-connector-03  (fcu-01)
#   device 1004 / port 47811  →  bacnet-connector-04  (chiller-01)
#   device 1005 / port 47812  →  bacnet-connector-05  (env-01)


x-bacnet-connector: &bacnet-connector-base
  build:
    context: ../../connector/bacnet
    dockerfile: Dockerfile
  network_mode: host
  restart: unless-stopped
  environment:
    NATS_URL: "nats://127.0.0.1:${NATS_HOST_PORT:-14222}"
    BACNET_LOCAL_ADDRESS: "0.0.0.0"
    BACNET_POLL_INTERVAL: "30"

services:
  # ── NATS JetStream ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "${NATS_HOST_PORT:-14222}:4222"
      - "18222:8222"
    volumes:
      - nats-scale-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── BACnet multi-device simulator (5 virtual devices on ports 47808-47812) ─
  bacnet-sim:
    build:
      context: ../../connector/bacnet
      dockerfile: Dockerfile.sim-multi
    network_mode: host
    restart: unless-stopped
    environment:
      BACNET_HOST: "0.0.0.0"
      BACNET_BASE_PORT: "47808"
      VALUE_CHANGE_RATE: "5"

  # ── OPC-UA simulator (1000 nodes: Float×500, Bool×300, Int×200) ────────────
  opcua-sim:
    build:
      context: ../../connector/opcua/sim
      dockerfile: Dockerfile.scale
    restart: unless-stopped
    ports:
      - "4840:4840"
    environment:
      OPCUA_SERVER_ENDPOINT: "opc.tcp://0.0.0.0:4840/"
      VALUE_CHANGE_RATE: "5"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost',4840)); s.close()\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ── BACnet connectors (one per physical device) ────────────────────────────
  bacnet-connector-01:
    <<: *bacnet-connector-base
    env_file: envs/bacnet-01.env
    environment:
      CONNECTOR_ID: "bacnet-01"
      NATS_URL: "nats://127.0.0.1:${NATS_HOST_PORT:-14222}"
      BACNET_ADDRESS: "127.0.0.1:47808"
      BACNET_DEVICE_ID: "1001"
      BACNET_LOCAL_ADDRESS: "0.0.0.0"
      BACNET_POLL_INTERVAL: "30"
    depends_on:
      nats:
        condition: service_healthy

  bacnet-connector-02:
    <<: *bacnet-connector-base
    env_file: envs/bacnet-02.env
    environment:
      CONNECTOR_ID: "bacnet-02"
      NATS_URL: "nats://127.0.0.1:${NATS_HOST_PORT:-14222}"
      BACNET_ADDRESS: "127.0.0.1:47809"
      BACNET_DEVICE_ID: "1002"
      BACNET_LOCAL_ADDRESS: "0.0.0.0"
      BACNET_POLL_INTERVAL: "30"
    depends_on:
      nats:
        condition: service_healthy

  bacnet-connector-03:
    <<: *bacnet-connector-base
    env_file: envs/bacnet-03.env
    environment:
      CONNECTOR_ID: "bacnet-03"
      NATS_URL: "nats://127.0.0.1:${NATS_HOST_PORT:-14222}"
      BACNET_ADDRESS: "127.0.0.1:47810"
      BACNET_DEVICE_ID: "1003"
      BACNET_LOCAL_ADDRESS: "0.0.0.0"
      BACNET_POLL_INTERVAL: "30"
    depends_on:
      nats:
        condition: service_healthy

  bacnet-connector-04:
    <<: *bacnet-connector-base
    env_file: envs/bacnet-04.env
    environment:
      CONNECTOR_ID: "bacnet-04"
      NATS_URL: "nats://127.0.0.1:${NATS_HOST_PORT:-14222}"
      BACNET_ADDRESS: "127.0.0.1:47811"
      BACNET_DEVICE_ID: "1004"
      BACNET_LOCAL_ADDRESS: "0.0.0.0"
      BACNET_POLL_INTERVAL: "30"
    depends_on:
      nats:
        condition: service_healthy

  bacnet-connector-05:
    <<: *bacnet-connector-base
    env_file: envs/bacnet-05.env
    environment:
      CONNECTOR_ID: "bacnet-05"
      NATS_URL: "nats://127.0.0.1:${NATS_HOST_PORT:-14222}"
      BACNET_ADDRESS: "127.0.0.1:47812"
      BACNET_DEVICE_ID: "1005"
      BACNET_LOCAL_ADDRESS: "0.0.0.0"
      BACNET_POLL_INTERVAL: "30"
    depends_on:
      nats:
        condition: service_healthy

  # ── OPC-UA connector ────────────────────────────────────────────────────────
  opcua-connector:
    build:
      context: ../../connector/opcua
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: envs/opcua-01.env
    environment:
      CONNECTOR_ID: "opcua-01"
      NATS_URL: "nats://nats:4222"
      OPCUA_ENDPOINT: "opc.tcp://opcua-sim:4840"
    depends_on:
      nats:
        condition: service_healthy
      opcua-sim:
        condition: service_healthy

  # ── Gateway ─────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - ../../fixtures:/fixtures:ro
      - gateway-scale-data:/data
    environment:
      GATEWAY_ID: "gw-001"
      NATS_URL: "nats://nats:4222"
      BOS_INGRESS_ADDR: "${BOS_INGRESS_ADDR:-192.168.0.18:5051}"
      BOS_EGRESS_ADDR: "${BOS_EGRESS_ADDR:-192.168.0.18:5052}"
      BOS_INSECURE: "true"
      POINT_LIST_FILE: "/fixtures/scale/point_list_2000.json"
      POINT_LIST_PERSIST: "/data/point_list.json"
      ADMIN_ADDR: ":8080"
      SF_DB: "/data/storeforward.db"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  nats-scale-data:
  gateway-scale-data:
