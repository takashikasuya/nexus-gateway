# EP-009 simulator integration overlay (FEAT-037).
#
# Brings up the SIBLING standard-compliant simulators — bacnet-sim-gateway
# (bbc-sim, BACnet/IP) and opcua-sim-gateway (opcua-sim, OPC UA opc.tcp) — plus
# the matching nexus connectors, all driven from one shared Point List
# (fixtures/integration/point_list.json). The 8 logical points PT001..PT008 are
# modelled by BOTH sims with protocol-native addressing, so the connectors and
# the Normalizer resolve native local_id -> point_id against real device values.
#
# The sibling repos must be checked out next to this one (../bacnet-sim-gateway,
# ../opcua-sim-gateway). Profiles keep the two protocols separate so a given
# point_id has a single source per run:
#
#   docker compose -f docker-compose.yml -f docker-compose.integration.yml --profile opcua  up   # OPC-UA E2E (#39, CI-friendly)
#   docker compose -f docker-compose.yml -f docker-compose.integration.yml --profile bacnet up   # BACnet E2E (#40, needs host networking)
#
# Runtime verification (telemetry actually flowing) is #39/#40; this file is the
# topology + shared addressing. Sibling-specific details flagged TODO are nailed
# down there against a live run.

version: "3.9"

services:
  # The gateway resolves native addressing using the shared integration Point List
  # instead of the default sim fixture (./fixtures is already mounted by the base file).
  # DEV_SIM stays false (default) so the in-process sim connector does not publish
  # sim://… events that the integration Point List does not contain.
  gateway:
    environment:
      - POINT_LIST_FILE=/fixtures/integration/point_list.json
      - DEV_SIM=false

  # ── OPC-UA (profile: opcua) — plain TCP:4840, CI-friendly ────────────────────
  opcua-sim:
    profiles: ["opcua"]
    build:
      context: ../opcua-sim-gateway
      dockerfile: docker/Dockerfile
    image: opcua-sim:dev
    environment:
      # server_id MUST NOT be derived from gateway_id (opcua-sim ADR-003).
      SERVER_ID: ua-local-001
    ports:
      - "4840:4840"
    restart: unless-stopped

  opcua-connector:
    profiles: ["opcua"]
    build:
      context: connector/opcua
    environment:
      - CONNECTOR_ID=opcua-01
      - NATS_URL=nats://nats:4222
      - OPCUA_ENDPOINT=opc.tcp://opcua-sim:4840
      - OPCUA_DEVICE_REF=ahu-01
      - OPCUA_POLL_INTERVAL=5
      # NodeIds match opcua-sim's address space (ns=2;s=PT00x) and the shared Point List.
      - |
        OPCUA_POINTS=[
          {"local_id":"ns=2;s=PT001","device_ref":"ahu-01","unit":"Cel"},
          {"local_id":"ns=2;s=PT002","device_ref":"ahu-01","unit":"%RH"},
          {"local_id":"ns=2;s=PT003","device_ref":"ahu-01","unit":""},
          {"local_id":"ns=2;s=PT004","device_ref":"ahu-01","unit":"","writable":true},
          {"local_id":"ns=2;s=PT005","device_ref":"ahu-01","unit":""},
          {"local_id":"ns=2;s=PT006","device_ref":"ahu-01","unit":"Cel","writable":true},
          {"local_id":"ns=2;s=PT007","device_ref":"ahu-01","unit":"","writable":true},
          {"local_id":"ns=2;s=PT008","device_ref":"ahu-01","unit":"ppm"}
        ]
    depends_on:
      nats:
        condition: service_healthy
      opcua-sim:
        condition: service_started
    restart: unless-stopped

  # ── BACnet (profile: bacnet) — BACnet/IP, needs host networking for Who-Is ───
  bbc-sim:
    profiles: ["bacnet"]
    build:
      context: ../bacnet-sim-gateway
      dockerfile: docker/Dockerfile
    network_mode: host # BACnet/IP discovery is UDP broadcast (port 47808)
    volumes:
      - ../bacnet-sim-gateway/config:/app/config:ro
    command: ["run", "--config", "config/simulator.yaml"]
    restart: unless-stopped

  bacnet-connector:
    profiles: ["bacnet"]
    build:
      context: connector/bacnet
    environment:
      - CONNECTOR_ID=bacnet-01
      - NATS_URL=nats://localhost:4222 # host networking: nats is published on the host
      - BACNET_ADDRESS=127.0.0.1
      - BACNET_DEVICE_ID=1001 # bbc-sim device_id (config/simulator.yaml)
      - BACNET_LOCAL_ADDRESS=0.0.0.0
      - BACNET_POLL_INTERVAL=5
      # Object type,instance pairs match bbc-sim's objects and the shared Point List.
      - |
        BACNET_POINTS=[
          {"local_id":"analogInput,1001","device_ref":"ahu-01","unit":"degC"},
          {"local_id":"analogInput,1","device_ref":"ahu-01","unit":"%RH"},
          {"local_id":"binaryInput,1","device_ref":"ahu-01","unit":""},
          {"local_id":"binaryOutput,2001","device_ref":"ahu-01","unit":"","writable":true},
          {"local_id":"multiStateInput,1","device_ref":"ahu-01","unit":""},
          {"local_id":"analogValue,1002","device_ref":"ahu-01","unit":"degC","writable":true},
          {"local_id":"multiStateValue,3001","device_ref":"ahu-01","unit":"","writable":true},
          {"local_id":"analogInput,1003","device_ref":"ahu-01","unit":"ppm"}
        ]
    network_mode: host
    depends_on:
      nats:
        condition: service_healthy
      bbc-sim:
        condition: service_started
    restart: unless-stopped
